AWSTemplateFormatVersion: "2010-09-09"
Description: "Yobee Cloud Migration - Application Load Balancer"

Parameters:
  EnvironmentName:
    Type: String
    Default: YobeeMigration

Resources:

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  YoobeeALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-ALB"
      Scheme: internet-facing
      Type: application
      Subnets:
        - Fn::ImportValue: !Sub "${EnvironmentName}-PublicSubnet1Id"
        - Fn::ImportValue: !Sub "${EnvironmentName}-PublicSubnet2Id"
      SecurityGroups:
        - Fn::ImportValue: !Sub "${EnvironmentName}-ALBSecurityGroupId"
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: "false"
        - Key: access_logs.s3.enabled
          Value: "true"
        - Key: access_logs.s3.bucket
          Value:
            Fn::ImportValue: !Sub "${EnvironmentName}-AccessLogsBucketName"
        - Key: access_logs.s3.prefix
          Value: alb-access-logs
      Tags:
        - Key: Project
          Value: YobeeMigration

  # ---------------------------------------------------------------------------
  # HTTP Listener (port 80) — default action forwards to LMS target group
  # ---------------------------------------------------------------------------
  ALBHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref YoobeeALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn:
            Fn::ImportValue: !Sub "${EnvironmentName}-LMSTargetGroupArn"

  # ---------------------------------------------------------------------------
  # Listener Rule — /faculty/* path routed to Faculty target group
  # ---------------------------------------------------------------------------
  FacultyListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBHTTPListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /faculty/*
      Actions:
        - Type: forward
          TargetGroupArn:
            Fn::ImportValue: !Sub "${EnvironmentName}-FacultyTargetGroupArn"

Outputs:
  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt YoobeeALB.DNSName
    Export:
      Name: !Sub "${EnvironmentName}-ALBDNSName"

  ALBCanonicalHostedZoneId:
    Description: Canonical hosted zone ID of the Application Load Balancer
    Value: !GetAtt YoobeeALB.CanonicalHostedZoneID
    Export:
      Name: !Sub "${EnvironmentName}-ALBCanonicalHostedZoneId"

  ALBFullName:
    Description: Full name of the Application Load Balancer (used in CloudWatch dimensions)
    Value: !GetAtt YoobeeALB.LoadBalancerFullName
    Export:
      Name: !Sub "${EnvironmentName}-ALBFullName"
