name: Deploy CloudFormation Stack

on:
  push:
    branches:
      - main
    paths:
      - 'yoobee-cloudformation-stack.yaml'
      - '.github/workflows/deploy-cloudformation.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - delete

env:
  STACK_NAME: yoobee-college-stack
  AWS_REGION: ap-southeast-2        # Change to your target region

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://yoobee-cloudformation-stack.yaml

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file yoobee-cloudformation-stack.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DBPassword=${{ secrets.DB_PASSWORD }} \
              KeyPairName=${{ secrets.KEY_PAIR_NAME }} \
              DBUsername=${{ secrets.DB_USERNAME }} \
              AdminEmail=${{ secrets.ADMIN_EMAIL }} \
              AllowedAdminCIDR=${{ secrets.ALLOWED_ADMIN_CIDR }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show stack outputs
        if: success()
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs' \
            --output table

  delete:
    name: Delete Stack
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'delete'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete CloudFormation stack
        run: |
          aws cloudformation delete-stack \
            --stack-name ${{ env.STACK_NAME }}

      - name: Wait for deletion
        run: |
          aws cloudformation wait stack-delete-complete \
            --stack-name ${{ env.STACK_NAME }}
          echo "Stack deleted successfully."
